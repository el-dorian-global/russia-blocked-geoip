name: Build geoip files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,9,15,21 * * *"
  push:
    branches:
      - main
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

# Добавляем права на запись для GitHub Actions
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout runetfreedom geoip generator
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geoip
          path: geoip

      - name: Checkout mobile whitelist
        uses: actions/checkout@v4
        with:
          repository: hxehex/russia-mobile-internet-whitelist
          path: mobile-whitelist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geoip/go.mod
          # Указываем, где искать файл для расчета хэша кэша
          cache-dependency-path: ./geoip/go.sum

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Inject mobile whitelist into geoip config
        run: |
          cp mobile-whitelist/ipwhitelist.txt geoip/mobile-whitelist.txt
          sudo apt-get update && sudo apt-get install -y jq
          
          jq '.input += [{
            "type": "text",
            "tag": "mobile-whitelist",
            "file": "mobile-whitelist.txt"
          }] | .rules += [{
            "tag": "mobile-whitelist",
            "file": "mobile-whitelist.txt"
          }]' geoip/config.json > geoip/config-new.json
          mv geoip/config-new.json geoip/config.json

      - name: Build geoip generator
        run: |
          cd geoip && go build -o ../geoip-bin ./

      - name: Build geoip databases
        run: |
          ./geoip-bin convert -c ./geoip/config.json

      - name: Verify mmdb files
        run: |
          cd ./output || exit 1
          go install ://github.com
          for name in *.mmdb; do
            $(go env GOPATH)/bin/mmdbverify -file "${name}"
          done

      - name: Generate sha256 checksums
        run: |
          cd ./output || exit 1
          for name in *.dat *.mmdb; do
            sha256sum "${name}" > "${name}.sha256sum"
          done

      - name: Push files to release branch
        run: |
          cd output || exit 1
          git init
          git checkout -b release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "${{ env.RELEASE_NAME }}"
          # Используем стандартный метод аутентификации через заголовок или URL
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}"
          git push origin release --force

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in *; do
            curl -s "https://purge.jsdelivr.net{{ github.repository }}@release/${file}" || true
          done

      - name: Remove files not needed for GitHub release
        run: |
          rm -rf ./output/*.{gz,zip}
          rm -rf ./output/GeoLite2-*.csv
          rm -rf ./output/GeoLite2-*.mmdb
          rm -rf ./output/GeoLite2-*.sha256sum
          rm -rf ./output/{clash,dat,mrs,nginx,srs,surge,text}

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          overwrite: true
