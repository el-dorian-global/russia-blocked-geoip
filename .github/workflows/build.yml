name: Build geoip files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,9,15,21 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout runetfreedom/geoip
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geoip
          path: geoip

      - name: Checkout mobile whitelist
        uses: actions/checkout@v4
        with:
          repository: hxehex/russia-mobile-internet-whitelist
          path: mobile-whitelist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geoip/go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        shell: bash

      - name: Inject mobile whitelist and fix config
        run: |
          # Копируем конфиг из твоего репозитория в папку генератора
          cp config.json geoip/config.json
          # Копируем скачанный вайтлист в папку генератора
          cp mobile-whitelist/ipwhitelist.txt geoip/mobile-whitelist.txt
          
          sudo apt-get update && sudo apt-get install -y jq

          # 1. Добавляем в секцию input новый источник
          # 2. Добавляем "mobile-whitelist" во все списки wantedList в output
          jq '.input += [{
            "type": "text",
            "action": "add",
            "args": {
              "name": "mobile-whitelist",
              "uri": "file://./mobile-whitelist.txt"
            }
          }] | 
          (.output[] | select(.args.wantedList != null) | .args.wantedList) += ["mobile-whitelist"]' \
          geoip/config.json > geoip/config-new.json

          mv geoip/config-new.json geoip/config.json

      - name: Build geoip generator
        run: |
          cd geoip && go build -o ../geoip-bin ./

      - name: Build geoip databases
        run: |
          ./geoip-bin convert -c ./geoip/config.json

      - name: Verify mmdb files
        run: |
          go install ://github.com
          for name in ./output/*.mmdb; do
            [ -f "$name" ] || continue
            $(go env GOPATH)/bin/mmdbverify -file "${name}"
          done

      - name: Generate sha256 checksums
        run: |
          cd ./output || exit 1
          for name in *.dat *.mmdb; do
            [ -f "$name" ] || continue
            sha256sum "${name}" > "${name}.sha256sum"
          done

      - name: Remove temporary files
        run: |
          # Удаляем лишнее ДО пуша и релиза
          rm -rf ./output/*.{gz,zip}
          rm -rf ./output/GeoLite2-*
          rm -rf ./output/{clash,dat,mrs,nginx,srs,surge,text}

      - name: Git push assets to "release" branch
        run: |
          cd output || exit 1
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@://github.com{{ github.repository }}"
          git push -f origin release

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          overwrite: true

      - name: Purge jsdelivr CDN
        run: |
          cd output || exit 1
          for file in *; do
            [ -f "$file" ] || continue
            curl -s "https://purge.jsdelivr.net{{ github.repository }}@release/${file}" || true
          done
