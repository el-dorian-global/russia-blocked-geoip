name: Build geoip files

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3,9,15,21 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - ".gitignore"
      - "LICENSE*"
      - "*.md"

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout runetfreedom geoip
        uses: actions/checkout@v4
        with:
          repository: runetfreedom/geoip
          path: geoip

      - name: Checkout mobile whitelist
        uses: actions/checkout@v4
        with:
          repository: hxehex/russia-mobile-internet-whitelist
          path: mobile-whitelist

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./geoip/go.mod

      - name: Set variables
        run: |
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
          echo "RELEASE_NAME=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Inject mobile list into config
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          cp config.json geoip/config.json

          if [ -f mobile-whitelist/ipwhitelist.txt ]; then
            cp mobile-whitelist/ipwhitelist.txt geoip/mobile-blacklist.txt
            echo "Mobile list size:"
            wc -l geoip/mobile-blacklist.txt
          else
            echo "Mobile whitelist not found"
            exit 1
          fi

          jq '.input += [{
            "type": "text",
            "action": "add",
            "args": {
              "name": "mobile-blacklist",
              "uri": "file://./mobile-blacklist.txt"
            }
          }] |
          (.output[] | select(.args.wantedList != null) | .args.wantedList) += ["mobile-blacklist"]' \
          geoip/config.json > geoip/config-new.json

          mv geoip/config-new.json geoip/config.json

      - name: Build geoip generator
        run: |
          cd geoip
          go build -o ../geoip-bin ./

      - name: Build geoip databases
        run: |
          ./geoip-bin convert -c ./geoip/config.json

      - name: Verify mmdb files
        run: |
          go install github.com/maxmind/mmdbverify@latest
          for name in ./output/*.mmdb; do
            [ -f "$name" ] || continue
            $(go env GOPATH)/bin/mmdbverify -file "${name}"
          done

      - name: Generate sha256 checksums
        run: |
          cd output
          for name in *.dat *.mmdb; do
            [ -f "$name" ] || continue
            sha256sum "${name}" > "${name}.sha256sum"
          done

      - name: Remove temporary files
        run: |
          rm -f ./output/*.gz ./output/*.zip || true
          rm -rf ./output/GeoLite2-* || true
          rm -rf ./output/{clash,dat,mrs,nginx,srs,surge,text} || true

      - name: Git push assets to release branch
        run: |
          cd output
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b release
          git add -A
          git commit -m "${{ env.RELEASE_NAME }}"

          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release

      - name: Upload files to GitHub release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file_glob: true
          file: ./output/*
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          overwrite: true

      - name: Purge jsdelivr CDN
        run: |
          cd output
          for file in *; do
            [ -f "$file" ] || continue
            curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/${file}" || true
          doneы